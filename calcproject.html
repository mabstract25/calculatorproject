<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calcproject.css">
</head>
<body>
    <div class="pagecontainer">
        <div class="container">
            <div class="displaycontainer">
                <p id="displayText"></p>
            </div>
            <div class="buttonscontainer">
                    <div class="buttongrid" id="numberGrid">
                        <button class="numberbutton" value="1"><p>1</p></button>
                        <button class="numberbutton" value="2"><p>2</p></button>
                        <button class="numberbutton" value="3"><p>3</p></button>
                        <button class="numberbutton" value="4"><p>4</p></button>
                        <button class="numberbutton" value="5"><p>5</p></button>
                        <button class="numberbutton" value="6"><p>6</p></button>
                        <button class="numberbutton" value="7"><p>7</p></button>
                        <button class="numberbutton" value="8"><p>8</p></button>
                        <button class="numberbutton" value="9"><p>9</p></button>
                        <button class="numberbutton" value="0"><p>0</p></button>
                    </div>
                    <div class="functionbuttons">
                        <button class="funcbutton" value="+"><p>ADD</p></button>
                        <button class="funcbutton" value="-"><p>SUB</p></button>
                        <button class="funcbutton" value="*"><p>MULT</p></button>
                        <button class="funcbutton" value="/"><p>DIV</p></button>
                        <button class="funcbutton" onclick="check()"><p>=</p></button>
                        <button class="funcbutton"><p>CLEAR</p></button>
                    </div>
            </div>
            
        </div>
    </div>
</body>
<script src="/calcproject.js"></script>
</html>
